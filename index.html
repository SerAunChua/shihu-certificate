<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小小石滬匠師證書解鎖</title>

  <style>
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #eef8fb;
      padding: 20px;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      background: white;
      border-radius: 22px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.15);
      padding: 30px;
      text-align: center;
      box-sizing: border-box;
    }

    h1 {
      color: #276678;
      margin-top: 0;
    }

    .intro {
      color: #555;
      line-height: 1.8;
      margin-bottom: 20px;
    }

    input {
      width: 80%;
      max-width: 320px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #aaa;
      font-size: 16px;
      text-align: center;
      margin-bottom: 20px;
    }

    .color-row {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .color-btn {
      width: 95px;
      height: 95px;
      border-radius: 18px;
      border: 4px solid transparent;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
      color: white;
      font-size: 18px;
      font-weight: bold;
      appearance: none;
      -webkit-appearance: none;
    }

    .color-btn:hover {
      transform: scale(1.06);
    }

    .red { background-color: #e53935; }
    .blue { background-color: #1e88e5; }
    .green { background-color: #43a047; }
    .orange { background-color: #fb8c00; }

    .chosen {
      border-color: #222;
      opacity: 0.55;
      transform: scale(0.95);
    }

    #message {
      margin-top: 20px;
      min-height: 28px;
      font-size: 18px;
      font-weight: bold;
    }

    #progress {
      color: #777;
      margin-top: 8px;
    }

    .unlock-btn {
      display: none;
      margin-top: 22px;
      padding: 13px 28px;
      border: none;
      border-radius: 999px;
      background-color: #276678;
      color: white;
      font-size: 17px;
      cursor: pointer;
    }

    .reset-btn {
      margin-top: 15px;
      background: none;
      border: none;
      color: #777;
      text-decoration: underline;
      cursor: pointer;
      font-size: 14px;
    }

    #certificateArea {
      display: none;
      margin-top: 35px;
    }

    #certificateImage {
      width: 100%;
      max-width: 780px;
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.18);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>小小石滬匠師</h1>

    <p class="intro">
      請輸入暱稱，並依序點選正確的顏色密碼。
    </p>

    <input type="text" id="nickname" placeholder="請輸入暱稱">

    <div class="color-row" id="colorRow">
      <button type="button" class="color-btn red" data-color="red" aria-label="紅色"></button>
      <button type="button" class="color-btn blue" data-color="blue" aria-label="藍色"></button>
      <button type="button" class="color-btn green" data-color="green" aria-label="綠色"></button>
      <button type="button" class="color-btn orange" data-color="orange" aria-label="橘色"></button>
    </div>

    <div id="message">請開始輸入顏色密碼。</div>
    <div id="progress">目前進度：0 / 4</div>

    <button type="button" class="unlock-btn" id="unlockBtn">
      打開合格證書
    </button>

    <br>

    <button type="button" class="reset-btn" id="resetBtn">
      重新輸入密碼
    </button>

  <script>
    (function () {
      var password = ["red", "blue", "green", "orange"];
      var step = 0;

      var colorRow = document.getElementById("colorRow");
      var message = document.getElementById("message");
      var progress = document.getElementById("progress");
      var unlockBtn = document.getElementById("unlockBtn");
      var resetBtn = document.getElementById("resetBtn");
      var certificateArea = document.getElementById("certificateArea");
      var nicknameInput = document.getElementById("nickname");

      function shuffleColors() {
        var buttons = Array.prototype.slice.call(colorRow.querySelectorAll(".color-btn"));

        for (var i = buttons.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var temp = buttons[i];
          buttons[i] = buttons[j];
          buttons[j] = temp;
        }

        colorRow.innerHTML = "";
        for (var k = 0; k < buttons.length; k++) {
          colorRow.appendChild(buttons[k]);
        }
      }

      function resetPassword(clearMessage) {
        if (clearMessage === undefined) {
          clearMessage = true;
        }

        step = 0;

        var buttons = colorRow.querySelectorAll(".color-btn");
        for (var i = 0; i < buttons.length; i++) {
          buttons[i].classList.remove("chosen");
          buttons[i].disabled = false;
        }

        unlockBtn.style.display = "none";
        certificateArea.style.display = "none";
        progress.innerHTML = "目前進度：0 / 4";

        if (clearMessage) {
          message.innerHTML = "請重新開始輸入顏色密碼。";
          message.style.color = "#333";
        }

        shuffleColors();
      }

      function checkPassword(button) {
        var nickname = nicknameInput.value.replace(/^\s+|\s+$/g, "");
        var color = button.getAttribute("data-color");

        if (nickname === "") {
          message.innerHTML = "請先輸入暱稱。";
          message.style.color = "#d32f2f";
          return;
        }

        if (color === password[step]) {
          button.classList.add("chosen");
          button.disabled = true;
          step++;

          progress.innerHTML = "目前進度：" + step + " / " + password.length;

          if (step === password.length) {
            message.innerHTML = nickname + "，密碼正確！你已完成石滬匠師任務。";
            message.style.color = "#2e7d32";
            unlockBtn.style.display = "inline-block";
          } else {
            message.innerHTML = "正確，請繼續下一個顏色。";
            message.style.color = "#2e7d32";
          }
        } else {
          message.innerHTML = "密碼順序錯誤，請重新輸入。";
          message.style.color = "#d32f2f";
          resetPassword(false);
        }
      }

      function showCertificate() {
        certificateArea.style.display = "block";
        certificateArea.scrollIntoView({ behavior: "smooth" });
      }

      colorRow.addEventListener("click", function (event) {
        var target = event.target;
        if (target && target.classList.contains("color-btn")) {
          checkPassword(target);
        }
      });

      resetBtn.addEventListener("click", function () {
        resetPassword(true);
      });

      unlockBtn.addEventListener("click", function () {
        showCertificate();
      });

      shuffleColors();
    })();
  </script>
